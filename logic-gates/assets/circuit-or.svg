<svg width="660" height="195" xmlns="http://www.w3.org/2000/svg">
  <style>
    .w { stroke: #1e293b; stroke-width: 2.5; fill: none; stroke-linecap: round; }
    .lb { font-family: -apple-system, system-ui, sans-serif; font-size: 12px; fill: #64748b; text-anchor: middle; }
    .hd { font-family: -apple-system, system-ui, sans-serif; font-size: 12px; fill: #1e293b; text-anchor: middle; font-weight: 600; }
  </style>

  <rect width="660" height="195" fill="white" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- 전원 (centered on y=100) -->
  <rect x="14" y="83" width="60" height="34" rx="5" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="44" y="106" class="hd">Power</text>

  <!-- Wire to split -->
  <line x1="74" y1="100" x2="150" y2="100" class="w"/>
  <circle cx="150" cy="100" r="4" fill="#1e293b"/>

  <!-- Split vertical: up to top branch, down to bottom branch -->
  <line x1="150" y1="100" x2="150" y2="55" class="w"/>
  <line x1="150" y1="100" x2="150" y2="145" class="w"/>

  <!-- TOP BRANCH (y=55): 스위치 A -->
  <line x1="150" y1="55" x2="190" y2="55" class="w"/>
  <circle cx="190" cy="55" r="4" fill="#1e293b"/>
  <circle cx="300" cy="55" r="4" fill="#1e293b"/>
  <line x1="190" y1="55" x2="288" y2="35" class="w"/>
  <line x1="300" y1="55" x2="390" y2="55" class="w"/>
  <text x="245" y="22" class="lb">Switch A</text>

  <!-- BOTTOM BRANCH (y=145): 스위치 B -->
  <line x1="150" y1="145" x2="190" y2="145" class="w"/>
  <circle cx="190" cy="145" r="4" fill="#1e293b"/>
  <circle cx="300" cy="145" r="4" fill="#1e293b"/>
  <line x1="190" y1="145" x2="288" y2="125" class="w"/>
  <line x1="300" y1="145" x2="390" y2="145" class="w"/>
  <text x="245" y="173" class="lb">Switch B</text>

  <!-- Join vertical -->
  <line x1="390" y1="55" x2="390" y2="100" class="w"/>
  <line x1="390" y1="145" x2="390" y2="100" class="w"/>
  <circle cx="390" cy="100" r="4" fill="#1e293b"/>

  <!-- Wire to lamp -->
  <line x1="390" y1="100" x2="450" y2="100" class="w"/>

  <!-- 램프: center (478, 100) r=28 -->
  <circle cx="478" cy="100" r="28" class="w"/>
  <line x1="458" y1="80" x2="498" y2="120" class="w"/>
  <line x1="498" y1="80" x2="458" y2="120" class="w"/>
  <text x="478" y="148" class="lb">Lamp</text>

  <!-- Wire to GND -->
  <line x1="506" y1="100" x2="570" y2="100" class="w"/>

  <!-- GND -->
  <line x1="570" y1="100" x2="570" y2="112" class="w"/>
  <line x1="554" y1="112" x2="586" y2="112" class="w"/>
  <line x1="560" y1="120" x2="580" y2="120" class="w"/>
  <line x1="566" y1="128" x2="574" y2="128" class="w"/>
  <text x="570" y="148" class="lb">GND</text>
</svg>
