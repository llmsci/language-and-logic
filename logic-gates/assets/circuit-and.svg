<svg width="660" height="140" xmlns="http://www.w3.org/2000/svg">
  <style>
    .w { stroke: #1e293b; stroke-width: 2.5; fill: none; stroke-linecap: round; }
    .lb { font-family: -apple-system, system-ui, sans-serif; font-size: 12px; fill: #64748b; text-anchor: middle; }
    .hd { font-family: -apple-system, system-ui, sans-serif; font-size: 12px; fill: #1e293b; text-anchor: middle; font-weight: 600; }
  </style>

  <rect width="660" height="140" fill="white" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- 전원 -->
  <rect x="14" y="43" width="60" height="34" rx="5" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="44" y="66" class="hd">Power</text>
  <line x1="74" y1="60" x2="135" y2="60" class="w"/>

  <!-- 스위치 A -->
  <circle cx="135" cy="60" r="4" fill="#1e293b"/>
  <circle cx="230" cy="60" r="4" fill="#1e293b"/>
  <line x1="135" y1="60" x2="218" y2="40" class="w"/>
  <text x="182" y="93" class="lb">Switch A</text>

  <!-- wire -->
  <line x1="230" y1="60" x2="295" y2="60" class="w"/>

  <!-- 스위치 B -->
  <circle cx="295" cy="60" r="4" fill="#1e293b"/>
  <circle cx="390" cy="60" r="4" fill="#1e293b"/>
  <line x1="295" y1="60" x2="378" y2="40" class="w"/>
  <text x="342" y="93" class="lb">Switch B</text>

  <!-- wire to lamp -->
  <line x1="390" y1="60" x2="452" y2="60" class="w"/>

  <!-- 램프: center (480, 60) r=28 -->
  <circle cx="480" cy="60" r="28" class="w"/>
  <line x1="460" y1="40" x2="500" y2="80" class="w"/>
  <line x1="500" y1="40" x2="460" y2="80" class="w"/>
  <text x="480" y="108" class="lb">Lamp</text>

  <!-- wire to GND -->
  <line x1="508" y1="60" x2="578" y2="60" class="w"/>

  <!-- GND -->
  <line x1="578" y1="60" x2="578" y2="72" class="w"/>
  <line x1="562" y1="72" x2="594" y2="72" class="w"/>
  <line x1="568" y1="80" x2="588" y2="80" class="w"/>
  <line x1="574" y1="88" x2="582" y2="88" class="w"/>
  <text x="578" y="108" class="lb">GND</text>
</svg>
