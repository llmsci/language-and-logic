name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install mkdocs-material

      - name: Prepare MkDocs Content
        run: |
          mkdir -p docs_temp/sets docs_temp/bool docs_temp/logic-gates
          cp README.md docs_temp/index.md
          rsync -a sets/ docs_temp/sets/
          rsync -a bool/ docs_temp/bool/
          rsync -a logic-gates/ docs_temp/logic-gates/

      - run: mkdocs gh-deploy --force
